services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - 8080:8080
    depends_on:
      - server
    networks:
      - app-network
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
  db:
    image: neo4j:4.4-community
    ports:
      - "7474:7474" # UI
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    restart: unless-stopped
    volumes:
      - ./neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

  